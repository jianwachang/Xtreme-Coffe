<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Pagina non trovata — Extreme Coffee</title>
<meta name="robots" content="noindex"/>
<link rel="icon" href="/favicon.svg" type="image/svg+xml"/>
<link rel="apple-touch-icon" href="/apple-touch-icon.png"/>
<meta name="theme-color" content="#E8772E"/>
<style>
@font-face{font-family:'Bricolage Grotesque';font-weight:100 900;font-display:swap;src:url('/assets/fonts/bricolage.woff2') format('woff2')}
@font-face{font-family:'Inter';font-weight:100 900;font-display:swap;src:url('/assets/fonts/inter.woff2') format('woff2')}
:root{--cream:#FBF4EA;--ink:#2A1A10;--orange:#E8772E;--orange-d:#C85F1C;--muted:#897463}
*{box-sizing:border-box;margin:0}
body{background:var(--cream);color:var(--ink);font-family:'Inter',system-ui,sans-serif;
min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
.card{max-width:520px}
img{width:96px;height:96px}
h1{font-family:'Bricolage Grotesque',system-ui,sans-serif;font-size:clamp(28px,6vw,44px);color:var(--orange);margin:18px 0 6px}
p{color:var(--muted);font-size:17px;line-height:1.6}
a.btn{display:inline-block;margin-top:22px;background:var(--orange);color:#fff;text-decoration:none;
font-weight:700;padding:14px 26px;border-radius:999px}
a.btn:hover{background:var(--orange-d)}
</style>
</head>
<body>
  <div class="card">
    <img src="/favicon.svg" alt="Extreme Coffee"/>
    <h1>Questa pagina è andata a prendere un caffè ☕</h1>
    <p>La pagina che cerchi non esiste o è stata spostata. Ma il caffè è sempre lì che ti aspetta.</p>
    <a class="btn" href="/">Torna alla home</a>
  </div>
</body>
</html>
