name: Build APK Extreme Coffee

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write   # serve per pubblicare la Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Scarica il codice
        uses: actions/checkout@v4

      - name: Configura Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configura Android SDK
        uses: android-actions/setup-android@v3

      - name: Compila l'APK di debug
        run: ./gradlew assembleDebug --no-daemon

      - name: Rinomina l'APK
        run: |
          mkdir -p out
          cp app/build/outputs/apk/debug/*.apk out/extreme-coffee.apk

      - name: Pubblica come Release (link pubblico e scaricabile da chiunque)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Extreme Coffee - ultima build
          files: out/extreme-coffee.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
