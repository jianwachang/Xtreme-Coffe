name: Build Release AAB

# Compila l'App Bundle di release e, se sono presenti i secret del keystore,
# lo FIRMA con la chiave di upload. L'AAB (firmato) viene pubblicato sul branch 'aab'.
# Se i secret non ci sono, l'AAB viene comunque prodotto ma NON firmato.
#
# Secret richiesti per la firma (Settings -> Secrets and variables -> Actions):
#   KEYSTORE_BASE64    -> contenuto del file extreme-coffee-upload.jks in base64
#   KEYSTORE_PASSWORD  -> password dello store
#   KEY_ALIAS          -> alias della chiave (es. upload)
#   KEY_PASSWORD       -> password della chiave
#
# Parte a mano (Run workflow) o toccando tools/build_aab.txt.

on:
  push:
    branches: [ main, master ]
    paths:
      - "tools/build_aab.txt"
      - ".github/workflows/build-release-aab.yml"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Scarica il codice
        uses: actions/checkout@v4

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Android SDK
        uses: android-actions/setup-android@v3

      - name: Componenti SDK
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0" >/dev/null

      - name: Chiave Maps (se presente come secret)
        env:
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
        run: |
          if [ -n "$MAPS_API_KEY" ]; then
            if grep -q '^MAPS_API_KEY=' gradle.properties; then
              sed -i "s|^MAPS_API_KEY=.*|MAPS_API_KEY=${MAPS_API_KEY}|" gradle.properties
            else
              echo "MAPS_API_KEY=${MAPS_API_KEY}" >> gradle.properties
            fi
          fi

      - name: Prepara keystore per la firma (se secret presenti)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/upload.jks"
            # esporto KEYSTORE_PATH per gli step successivi: build.gradle.kts firma se e' presente
            echo "KEYSTORE_PATH=$RUNNER_TEMP/upload.jks" >> "$GITHUB_ENV"
            echo "Firma ABILITATA (keystore caricato dai secret)."
          else
            echo "Nessun KEYSTORE_BASE64: l'AAB sara' prodotto NON firmato."
          fi

      - name: Compila l'AAB di release
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          set -o pipefail
          ./gradlew bundleRelease --stacktrace 2>&1 | tee /tmp/aab.log

      - name: Verifica firma dell'AAB
        run: |
          AAB=app/build/outputs/bundle/release/app-release.aab
          ls -la "$AAB"
          if jarsigner -verify "$AAB" >/dev/null 2>&1; then
            echo "==> AAB FIRMATO correttamente."
            jarsigner -verify -certs "$AAB" 2>/dev/null | grep -m1 -iE "signed by|alias|CN=" || true
          else
            echo "==> ATTENZIONE: AAB NON firmato (secret keystore assenti o non validi)."
          fi

      - name: Pubblica l'AAB sul branch 'aab'
        run: |
          mkdir -p /tmp/aabout
          cp app/build/outputs/bundle/release/app-release.aab /tmp/aabout/app-release.aab
          cd /tmp/aabout
          git init -q
          git checkout -b aab
          git config user.email "actions@github.com"
          git config user.name "extreme-coffee-bot"
          git add app-release.aab
          git commit -q -m "AAB release build ${{ github.run_number }}"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" aab

      - name: Rimuovi keystore (sempre)
        if: always()
        run: rm -f "$RUNNER_TEMP/upload.jks"

      - name: Se fallisce, salva il log su branch aablog
        if: failure()
        run: |
          mkdir -p /tmp/al
          cp /tmp/aab.log /tmp/al/aab.log 2>/dev/null || echo "nessun log" > /tmp/al/aab.log
          cd /tmp/al
          git init -q
          git checkout -b aablog
          git config user.email "actions@github.com"
          git config user.name "log-bot"
          git add aab.log
          git commit -q -m "aab log ${{ github.run_number }}"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" aablog
