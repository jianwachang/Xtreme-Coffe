name: Release AAB
on:
  workflow_dispatch:
  push:
    paths: [".github/workflows/release-aab.yml"]
permissions:
  contents: write
jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17', cache: gradle }
      - uses: android-actions/setup-android@v3
      - name: SDK components
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0" >/dev/null
      - name: Maps key (optional secret)
        env: { MAPS_API_KEY: "${{ secrets.MAPS_API_KEY }}" }
        run: |
          if [ -n "$MAPS_API_KEY" ]; then
            sed -i "s|^MAPS_API_KEY=.*|MAPS_API_KEY=${MAPS_API_KEY}|" gradle.properties || echo "MAPS_API_KEY=${MAPS_API_KEY}" >> gradle.properties
          fi
      - name: Decode keystore (optional secret)
        env: { KEYSTORE_BASE64: "${{ secrets.KEYSTORE_BASE64 }}" }
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > /tmp/upload.jks
            echo "KEYSTORE_PATH=/tmp/upload.jks" >> "$GITHUB_ENV"
            echo "Keystore presente: l'AAB sara' FIRMATO."
          else
            echo "Nessun keystore: l'AAB sara' NON firmato (solo per verifica build)."
          fi
      - name: Build bundleRelease
        env:
          KEYSTORE_PASSWORD: "${{ secrets.KEYSTORE_PASSWORD }}"
          KEY_ALIAS: "${{ secrets.KEY_ALIAS }}"
          KEY_PASSWORD: "${{ secrets.KEY_PASSWORD }}"
        run: |
          set -o pipefail
          chmod +x ./gradlew
          ./gradlew bundleRelease --stacktrace 2>&1 | tee /tmp/rel.log
      - name: Save log on failure
        if: failure()
        run: |
          mkdir -p /tmp/lg; cp /tmp/rel.log /tmp/lg/rel.log 2>/dev/null || echo nolog > /tmp/lg/rel.log
          cd /tmp/lg; git init -q; git checkout -b releaselog
          git config user.email b@e.app; git config user.name bot
          git add rel.log; git commit -q -m "rel log ${{ github.run_number }}"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" releaselog
      - name: Publish AAB to branch aab
        if: success()
        run: |
          AAB=$(ls app/build/outputs/bundle/release/*.aab | head -1)
          echo "Trovato: $AAB"
          cp "$AAB" /tmp/app-release.aab
          git config user.name ci; git config user.email ci@local
          git checkout --orphan aab
          git rm -rf --cached . >/dev/null 2>&1 || true
          rm -f app-release.aab 2>/dev/null || true
          cp /tmp/app-release.aab app-release.aab
          git add app-release.aab
          git commit -m "release aab"
          git push -f origin aab
      - uses: actions/upload-artifact@v4
        if: success()
        with: { name: app-release-aab, path: app/build/outputs/bundle/release/*.aab }
