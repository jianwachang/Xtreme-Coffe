name: Register Android App
on:
  push:
    branches: [ main, master ]
    paths: [ "tools/register_app.txt", ".github/workflows/register-android-app.yml" ]
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  register:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install deps
        run: npm install google-auth-library --no-save
      - name: Register app + merge google-services
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node tools/registerAndroidApp.js
      - name: Publish result to orphan branch gsresult
        run: |
          git config user.name claude
          git config user.email claude@local
          mkdir -p /tmp/out
          cp op-result.json /tmp/out/ 2>/dev/null || true
          cp google-services.b64 /tmp/out/ 2>/dev/null || true
          git checkout --orphan gsresult
          git rm -rf . >/dev/null 2>&1 || true
          cp /tmp/out/* .
          git add -A
          git commit -m "gsresult $(date -u +%FT%TZ)" || true
          git push -f origin gsresult
