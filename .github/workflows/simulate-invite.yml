name: Simulate invite
on:
  workflow_dispatch:
  push:
    paths:
      - "tools/simulate_invite.js"
      - ".github/workflows/simulate-invite.yml"
jobs:
  sim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install firebase-admin
        run: npm i firebase-admin@12 --no-save
      - name: Run simulation
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node tools/simulate_invite.js
      - name: Publish result to simlog branch
        if: always()
        run: |
          cp sim-result.json /tmp/sim-result.json 2>/dev/null || echo '{"status":"NO_RESULT"}' > /tmp/sim-result.json
          git config user.name ci
          git config user.email ci@local
          git checkout --orphan simlog
          git rm -rf --cached . >/dev/null 2>&1 || true
          rm -f sim-result.json 2>/dev/null || true
          cp /tmp/sim-result.json sim-result.json
          git add sim-result.json
          git commit -m "sim result"
          git push -f origin simlog
