name: Deploy Firebase Functions

# Distribuisce le Cloud Functions quando cambiano i file in functions/,
# oppure a mano dal tab Actions (Run workflow).
# Richiede il secret FIREBASE_SERVICE_ACCOUNT (chiave JSON di un service account del progetto).

on:
  push:
    branches: [ main, master ]
    paths: [ "functions/**", ".github/workflows/deploy-functions.yml" ]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Scarica il codice
        uses: actions/checkout@v4

      - name: Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installa firebase-tools
        run: npm i -g firebase-tools

      - name: Installa dipendenze della function
        run: cd functions && (npm ci || npm install)

      - name: Scrivi la credenziale del service account
        run: |
          cat > "$GITHUB_WORKSPACE/sa.json" <<'EOF'
          ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          EOF

      - name: Deploy delle functions
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/sa.json
        run: |
          set -o pipefail
          firebase deploy --only functions --project extreme-coffe --non-interactive 2>&1 | tee /tmp/deploy.log

      - name: Se fallisce, salva il log su branch deploylog
        if: failure()
        run: |
          mkdir -p /tmp/dl
          cp /tmp/deploy.log /tmp/dl/deploy.log 2>/dev/null || echo "nessun log" > /tmp/dl/deploy.log
          cd /tmp/dl
          git init -q
          git checkout -b deploylog
          git config user.email "bot@extremecoffee.app"
          git config user.name "log-bot"
          git add deploy.log
          git commit -q -m "deploy log ${{ github.run_number }}"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" deploylog
