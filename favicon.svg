  <circle cx="24" cy="34" r="1.5" fill="#2A1A10"/>
  <path d="M32 34 q3 -2 6 0" fill="none" stroke="#2A1A10" stroke-width="2" stroke-linecap="round"/>
  <path d="M24 38 q5 4 10 0" fill="none" stroke="#2A1A10" stroke-width="2" stroke-linecap="round"/>
</svg>
