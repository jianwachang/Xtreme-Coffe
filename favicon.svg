<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect x="2" y="2" width="60" height="60" rx="14" fill="#FBF4EA" stroke="#2A1A10" stroke-width="3"/>
  <!-- swoosh -->
  <path d="M12 46 Q32 58 52 46" fill="none" stroke="#E8772E" stroke-width="4" stroke-linecap="round"/>
  <!-- speed lines -->
  <line x1="47" y1="24" x2="57" y2="24" stroke="#C85F1C" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="47" y1="30" x2="58" y2="30" stroke="#C85F1C" stroke-width="2.4" stroke-linecap="round"/>
  <!-- saucer -->
  <ellipse cx="30" cy="46" rx="20" ry="4" fill="#ffffff" stroke="#2A1A10" stroke-width="2"/>
  <!-- cup body -->
  <rect x="16" y="24" width="26" height="20" rx="6" fill="#ffffff" stroke="#2A1A10" stroke-width="2.6"/>
  <!-- handle -->
  <circle cx="46" cy="34" r="5.5" fill="none" stroke="#2A1A10" stroke-width="2.6"/>
  <!-- coffee + latte heart -->
  <ellipse cx="29" cy="27" rx="10" ry="2.6" fill="#C85F1C"/>
  <path d="M29 25.6 c-1.4-1.6-4-.4-2.6 1.4 l2.6 2.2 2.6-2.2 c1.4-1.8-1.2-3-2.6-1.4z" fill="#FBF4EA"/>
